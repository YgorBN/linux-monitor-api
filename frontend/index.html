<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Monitor Dashboard</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    
    <h1>Linux Monitor Dashboard</h1>

    <div class="cards">

        <div class="card cpu-card">
            <h2>CPU</h2>
            <p id="cpu-info">Carregando...</p>
        

            <div class="progress-bar">
        
                <div id="cpu-bar" class="progress-fill"></div>
            </div>

        </div>




        <div class="card ram-card">
            <h2>RAM</h2>
            <p id="ram-info">Carregando...</p>

            <div class="progress-bar">
                <div id="ram-bar" class="progress-fill"></div>

            </div>

        </div>


        <div class="card disco-card">
            <h2>DISCO</h2>
            <p id="disco-info">Carregando...</p>

            <div class="progress-bar">
                <div id="disco-bar" class="progress-fill"></div>

            </div>


        </div>

        <div class="card uptime-card">
            <h2>UPTIME</h2>
            <p id="uptime-info">Carregando...</p>



        
        </div>


        <div class="chart-container">

            <canvas id="cpuChart"></canvas>

        </div>

        


    </div>








<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</body>
</html>
